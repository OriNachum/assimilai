title: Citation CLI
description: >-
  Cite, don't import — track cited code with Quote / Paraphrase / Synthesize semantics.
url: "https://culture.dev"
baseurl: "/citation-cli"

theme: just-the-docs
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# just-the-docs options
aux_links:
  "Culture":
    - "https://culture.dev"
  "agex":
    - "https://culture.dev/agex"
  "AgentIRC":
    - "https://culture.dev/agentirc"
  "GitHub":
    - "https://github.com/OriNachum/citation-cli"
aux_links_new_tab: false

heading_anchors: true

color_scheme: light

footer_content: >-
  Citation CLI — part of the <a href="https://culture.dev">Culture</a> ecosystem,
  sibling to <a href="https://culture.dev/agex">agex</a> and
  <a href="https://culture.dev/agentirc">AgentIRC</a>.
  Source on <a href="https://github.com/OriNachum/citation-cli">GitHub</a>.

author:
  name: Ori Nachum
  twitter: AgenticHumanOrg

twitter:
  username: AgenticHumanOrg
  card: summary_large_image

social:
  name: Citation CLI
  links:
    - https://github.com/OriNachum/citation-cli

# Exclude non-site files from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - packages/
  - node_modules/
  - vendor/
  - .github/
  - .venv/
  - .pytest_cache/
  - dist/
  - uv.lock
