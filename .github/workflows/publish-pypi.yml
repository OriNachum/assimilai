name: Publish Python Package

on:
  push:
    branches: [main]
    paths:
      - "packages/python/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/python/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv python install 3.12

      - run: uv sync

      - run: uv run pytest tests/ -v

  test-publish:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv python install 3.12

      - run: uv sync

      - name: Set dev version
        run: |
          BASE=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          DEV_VERSION="${BASE}.dev${{ github.run_number }}"
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" pyproject.toml
          echo "DEV_VERSION=${DEV_VERSION}" >> "$GITHUB_ENV"
          echo "Publishing ${DEV_VERSION} to TestPyPI"

      - name: Build and publish to TestPyPI
        run: |
          uv build
          uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always --check-url https://test.pypi.org/simple/

      - name: Print install command
        run: |
          echo "::notice::Test with: pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ assimilai==${DEV_VERSION}"

  publish:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv python install 3.12

      - run: uv sync

      - run: uv build

      - run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/
