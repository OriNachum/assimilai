name: Publish npm Package

on:
  push:
    branches: ["main"]
    paths: ["packages/npm/**"]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/npm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests
        run: npm test

      - name: Verify package
        run: npm pack --dry-run

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: packages/npm/

  npm-publish:
    needs: build
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/npm-v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
