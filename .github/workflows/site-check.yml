name: Site build check

on:
  pull_request:
    paths:
      - "**.md"
      - "_config.yml"
      - "Gemfile"
      - ".github/workflows/site-check.yml"
  push:
    branches: [main]
    paths:
      - "**.md"
      - "_config.yml"
      - "Gemfile"
      - ".github/workflows/site-check.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
