[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "citation-cli"
version = "0.1.0"
description = "Cite, don't import — track cited code in pyproject.toml with Quote / Paraphrase / Synthesize semantics"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Ori Nachum" }]
keywords = ["citation-cli", "cite", "code-reuse", "monorepo", "agent"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Build Tools",
]
dependencies = [
    "tomli>=1.0; python_version < '3.11'",
    "tomli-w>=1.0",
]

[dependency-groups]
dev = ["pytest>=7.0"]

[project.scripts]
cite = "citation_cli.cli:main"

[project.urls]
Homepage = "https://culture.dev/citation-cli"
Repository = "https://github.com/OriNachum/citation-cli"
Specification = "https://culture.dev/citation-cli/spec"
