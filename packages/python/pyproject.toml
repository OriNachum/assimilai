[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "assimilai"
version = "0.1.0"
description = "Copy, don't import — track assimilated code in pyproject.toml"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Ori Nachum" }]
keywords = ["assimilai", "code-reuse", "monorepo", "agent"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Build Tools",
]
dependencies = [
    "tomli>=1.0; python_version < '3.11'",
    "tomli-w>=1.0",
]

[project.scripts]
assimilai = "assimilai.cli:main"

[project.urls]
Homepage = "https://assimilai.dev"
Repository = "https://github.com/OriNachum/assimilai"
Specification = "https://assimilai.dev/spec"
